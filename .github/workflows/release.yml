name: Build & Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: macos-14
    env:
      MIX_ENV: prod
    steps:
      - uses: actions/checkout@v4

      - name: Extract version
        id: version
        run: |
          if [[ "$GITHUB_REF" == refs/tags/v* ]]; then
            echo "version=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT
            echo "is_tag=true" >> $GITHUB_OUTPUT
          else
            VERSION=$(grep '@version' mix.exs | head -1 | sed 's/.*"\(.*\)".*/\1/')
            echo "version=${VERSION}" >> $GITHUB_OUTPUT
            echo "is_tag=false" >> $GITHUB_OUTPUT
          fi

      - name: Install Erlang & Elixir
        uses: erlef/setup-beam@v1
        with:
          # Pinned to a patch that Burrito's ERTS CDN has prebuilt.
          # `'27'` resolves to the newest 27.x, which may not yet exist on
          # beam-machine-universal.b-cdn.net — bump only after confirming
          # the target patch returns 200 there.
          otp-version: '27.3.4.9'
          elixir-version: '1.17'

      - name: Install Zig
        uses: goto-bus-stop/setup-zig@v2
        with:
          version: 0.15.2

      - name: Cache deps, build, and Burrito ERTS
        uses: actions/cache@v4
        with:
          path: |
            deps
            _build
            ~/Library/Caches/burrito_file_cache
          key: ${{ runner.os }}-mix-prod-${{ hashFiles('mix.lock') }}
          restore-keys: |
            ${{ runner.os }}-mix-prod-

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install dependencies
        run: MERMEX_BUILD=true mix deps.get

      - name: Build macOS ARM binary
        run: MERMEX_BUILD=true BURRITO_TARGET=macos_arm mix release

      - name: Create Release
        if: steps.version.outputs.is_tag == 'true'
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: burrito_out/claude_plans_macos_arm

      - name: Update Homebrew formula
        if: steps.version.outputs.is_tag == 'true'
        env:
          GH_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          SHA256=$(shasum -a 256 burrito_out/claude_plans_macos_arm | awk '{print $1}')
          FORMULA=$(cat <<RUBY
          class ClaudePlans < Formula
            desc "Standalone viewer for Claude Code plans and project memory"
            homepage "https://github.com/jhlee111/claude_plans"
            url "https://github.com/jhlee111/claude_plans/releases/download/v${VERSION}/claude_plans_macos_arm"
            sha256 "${SHA256}"
            version "${VERSION}"
            license "MIT"

            depends_on arch: :arm64
            depends_on :macos

            def install
              bin.install "claude_plans_macos_arm" => "claude-plans"
            end

            test do
              assert_predicate bin/"claude-plans", :executable?
            end
          end
          RUBY
          )
          FILE_SHA=$(gh api repos/jhlee111/homebrew-tap/contents/Formula/claude-plans.rb --jq '.sha')
          echo "$FORMULA" | base64 | tr -d '\n' | \
            jq -Rs --arg sha "$FILE_SHA" '{message: "Update claude-plans to v'"${VERSION}"'", content: ., sha: $sha}' | \
            gh api repos/jhlee111/homebrew-tap/contents/Formula/claude-plans.rb -X PUT --input -
