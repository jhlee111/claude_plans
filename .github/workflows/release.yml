name: Build & Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

env:
  SIGNING_IDENTITY: "Developer ID Application: Jung Hoon Lee (LPT442F2X5)"
  NOTARY_PROFILE: "dictto-notarization"

jobs:
  build-and-release:
    runs-on: [self-hosted, macOS]
    steps:
      - uses: actions/checkout@v4

      - name: Extract version
        id: version
        run: |
          if [[ "$GITHUB_REF" == refs/tags/v* ]]; then
            echo "version=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT
            echo "is_tag=true" >> $GITHUB_OUTPUT
          else
            VERSION=$(grep '@version' mix.exs | head -1 | sed 's/.*"\(.*\)".*/\1/')
            echo "version=${VERSION}" >> $GITHUB_OUTPUT
            echo "is_tag=false" >> $GITHUB_OUTPUT
          fi

      - name: Install dependencies
        run: MIX_ENV=prod mix deps.get

      - name: Build macOS ARM binary
        run: BURRITO_TARGET=macos_arm MIX_ENV=prod mix release

      - name: Sign binary
        run: |
          codesign --force --sign "${{ env.SIGNING_IDENTITY }}" \
            --options runtime --timestamp \
            burrito_out/claude_plans_macos_arm

          codesign --verify --verbose burrito_out/claude_plans_macos_arm

      - name: Create DMG
        run: |
          brew install create-dmg 2>/dev/null || true

          DMG_NAME="ClaudePlans_${{ steps.version.outputs.version }}_macos_arm.dmg"
          STAGING_DIR=$(mktemp -d)

          cp burrito_out/claude_plans_macos_arm "$STAGING_DIR/"

          create-dmg \
            --volname "Claude Plans" \
            --window-pos 200 120 \
            --window-size 600 400 \
            --icon "claude_plans_macos_arm" 150 200 \
            --hide-extension "claude_plans_macos_arm" \
            --no-internet-enable \
            "$DMG_NAME" \
            "$STAGING_DIR/" || true

          codesign --force --sign "${{ env.SIGNING_IDENTITY }}" --timestamp "$DMG_NAME"

      - name: Notarize DMG
        run: |
          DMG_NAME="ClaudePlans_${{ steps.version.outputs.version }}_macos_arm.dmg"

          xcrun notarytool submit "$DMG_NAME" \
            --keychain-profile "${{ env.NOTARY_PROFILE }}" \
            --wait

          xcrun stapler staple "$DMG_NAME"

          spctl --assess --type open --context context:primary-signature --verbose=2 "$DMG_NAME"

      - name: Create Release
        if: steps.version.outputs.is_tag == 'true'
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            burrito_out/claude_plans_macos_arm
            ClaudePlans_${{ steps.version.outputs.version }}_macos_arm.dmg
